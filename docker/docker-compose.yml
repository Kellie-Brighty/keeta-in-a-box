version: "3.8"

services:
  keeta-node:
    # We use a generic alpine image temporarily mock the node
    # Since the official Keeta registry is currently private/closed-source.
    # Replace this with the official image when available.
    image: alpine:latest
    container_name: keeta-devnet-node
    ports:
      # Expose standard Keeta RPC/WebSocket ports
      - "8443:8443"
      - "443:443"
    volumes:
      - ./config:/etc/keeta
      - keeta_data:/var/lib/keeta
    environment:
      # Flag definitions for setting the node into single-node/dev mode
      - KEETA_NETWORK=local
      - KEETA_BOOTSTRAP=false
      - KEETA_VALIDATOR=true
    command: ["tail", "-f", "/dev/null"]

volumes:
  keeta_data:
